name: RISC-V Firecracker Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update. Leave empty to only upload the workflow artifact.
        required: false
        type: string
        default: ""
  push:
    tags:
      - "riscv64-*"
      - "firecracker-riscv64-*"

permissions:
  contents: write

jobs:
  build:
    name: Build riscv64gc musl Firecracker
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/rust-cross/rust-musl-cross:riscv64gc-musl
    env:
      TARGET: riscv64gc-unknown-linux-musl
      ASSET_DIR: release-riscv64gc-unknown-linux-musl
      ASSET_NAME: firecracker-riscv64gc-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -eu
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            file \
            libseccomp-dev \
            linux-libc-dev \
            linux-libc-dev-riscv64-cross
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          rustup target add "$TARGET" || true
          rustup component add rustfmt || true

      - name: Configure and verify RISC-V musl toolchain
        run: |
          set -eu
          export PATH="/usr/local/musl/bin:/opt/riscv64-linux-musl/bin:/opt/riscv64gc-linux-musl/bin:$PATH"
          echo "PATH=$PATH" >> "$GITHUB_ENV"

          linker=
          for candidate in \
            riscv64-linux-musl-gcc \
            riscv64-unknown-linux-musl-gcc \
            riscv64gc-unknown-linux-musl-gcc \
            riscv64gc-linux-musl-gcc
          do
            if command -v "$candidate" >/dev/null 2>&1; then
              linker=$(command -v "$candidate")
              break
            fi
          done

          if [ -z "$linker" ]; then
            linker=$(find /usr/local /opt -type f -name '*riscv*musl*gcc' -perm /111 2>/dev/null | sort | head -n1 || true)
          fi
          if [ -z "$linker" ]; then
            echo "No RISC-V musl gcc linker found. Available RISC-V toolchain files:" >&2
            find /usr/local /opt -name '*riscv*' 2>/dev/null | sort >&2 || true
            exit 1
          fi

          if [ "$linker" != "/usr/local/bin/riscv64-linux-musl-gcc" ]; then
            ln -sf "$linker" /usr/local/bin/riscv64-linux-musl-gcc
          fi
          command -v riscv64-linux-musl-gcc
          riscv64-linux-musl-gcc --version | head -n1

          headers=/usr/riscv64-linux-gnu/include
          if [ ! -f "$headers/linux/types.h" ] || [ ! -f "$headers/asm/types.h" ]; then
            echo "RISC-V Linux UAPI headers are missing under $headers" >&2
            find /usr -path '*/linux/types.h' -o -path '*/asm/types.h' 2>/dev/null | sort >&2 || true
            exit 1
          fi

          export TARGET_CFLAGS="-I$headers"
          export CFLAGS_riscv64gc_unknown_linux_musl="$TARGET_CFLAGS"
          export BINDGEN_EXTRA_CLANG_ARGS="--target=riscv64-unknown-linux-musl -I$headers"
          export CC_riscv64gc_unknown_linux_musl=riscv64-linux-musl-gcc
          {
            echo "TARGET_CFLAGS=$TARGET_CFLAGS"
            echo "CFLAGS_riscv64gc_unknown_linux_musl=$CFLAGS_riscv64gc_unknown_linux_musl"
            echo "BINDGEN_EXTRA_CLANG_ARGS=$BINDGEN_EXTRA_CLANG_ARGS"
            echo "CC_riscv64gc_unknown_linux_musl=$CC_riscv64gc_unknown_linux_musl"
          } >> "$GITHUB_ENV"

          cat >/tmp/riscv64-uapi-smoke.c <<'EOF'
          #include <asm/types.h>
          #include <linux/types.h>
          #include <linux/userfaultfd.h>
          int main(void) { return UFFD_API == 0xaa ? 0 : 0; }
          EOF
          riscv64-linux-musl-gcc $TARGET_CFLAGS -c /tmp/riscv64-uapi-smoke.c -o /tmp/riscv64-uapi-smoke.o
          file /tmp/riscv64-uapi-smoke.o

      - name: Build release asset
        run: tools/riscv64-release-firecracker.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: firecracker-riscv64gc-unknown-linux-musl
          path: release-riscv64gc-unknown-linux-musl/*
          if-no-files-found: error

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          files: release-riscv64gc-unknown-linux-musl/*
